        const db = getFirestore(app);

        window.saveOrderToFirestore = async (orderData) => {
            try {
                const docRef = await addDoc(collection(db, "orders"), {
                    ...orderData,
                    timestamp: serverTimestamp(),
                    status: "Pending Confirmation"

                alert('يرجى اختيار بوابة المحفظة الإلكترونية المستخدمة لإتمام المعاملة بنجاح.');
                return;

            buttonNode.disabled = true;
            buttonNode.innerHTML = `<span>جاري معالجة المعاملة...</span>`;

            const timestampFormatted = new Date().toLocaleString('ar-EG', { timeZone: 'Africa/Cairo' });

                senderFundingWallet: senderWallet,
                claimedTransferredSum: transferredAmount,
                currencyCodeUnit: currentCurrency,

            };

            const compiledTelegramArabicLogText = `
🔔 *إشعار عملية دفع جديدة | Meno Store*
──────────────────
👤 *المسؤول المستهدف:* @Sdxgj
📦 *نوع الطلب / القسم:* ${structuralOrderEntity.categoryType}
💎 *الخدمة المختارة:* ${structuralOrderEntity.selectedPackage}
🔗 *رابط الحساب / الآيدي المستهدف:* \`${structuralOrderEntity.targetAccountIdentifier}\`
💳 *بوابة الدفع المحددة:* ${structuralOrderEntity.paymentProviderGateway}
📱 *رقم محفظة المرسل (المحول منه):* \`${structuralOrderEntity.senderFundingWallet}\`
💰 *المبلغ المحول والعملة:* ${structuralOrderEntity.claimedTransferredSum} ${structuralOrderEntity.currencyCodeUnit}
⏰ *توقيت العملية الدقيق:* ${structuralOrderEntity.clientSystemTimestamp}
📊 *معرف قاعدة البيانات Firestore ID:* \`${committedFirestoreLogId || "Failed to Log"}\`
──────────────────
`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_CHAT_ID,
                        text: compiledTelegramArabicLogText,
                        parse_mode: "Markdown"
                    })
                });
            } catch (telegramException) {
                console.error("Critical connection drop executing Telegram API pipeline operations: ", telegramException);
            }

            // عرض واجهة نجاح المعاملة النهائية والـ Checkmark الشيك للعميل
